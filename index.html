<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>System Monitor</title>
	<link rel="stylesheet" href="static/css/style.css?v=3">
</head>

<body>
	<header>
		<h1>Orange Pi 系统监控</h1>
		<p id="local-time">正在连接服务器...</p>
	</header>

	<div class="container">
		<div class="card">
			<div class="card-title">CPU 核心状态</div>
			<div class="card-value"><span id="cpu-usage">0</span><span class="card-unit">%</span></div>
			<p class="card-subtitle">频率: <span id="cpu-freq">0</span> MHz | 温度: <span id="cpu-temp">--</span></p>
			<div class="progress-container">
				<div id="cpu-bar" class="progress-bar"></div>
			</div>
		</div>

		<div class="card">
			<div class="card-title">系统负载</div>
			<div class="load-row">
				<div class="load-item">
					<span class="load-value" id="load-1">0.00</span>
					<span class="load-label">1 分钟</span>
				</div>
				<div class="load-item">
					<span class="load-value" id="load-5">0.00</span>
					<span class="load-label">5 分钟</span>
				</div>
				<div class="load-item">
					<span class="load-value" id="load-15">0.00</span>
					<span class="load-label">15 分钟</span>
				</div>
			</div>
		</div>

		<div class="card">
			<div class="card-title">内存资源</div>
			<div class="card-value"><span id="mem-usage">0</span><span class="card-unit">%</span></div>
			<p id="mem-summary" class="card-subtitle">0 / 0 GB</p>
			<div class="progress-container">
				<div id="mem-bar" class="progress-bar"></div>
			</div>
			<div class="info-row" style="margin-top:0.8rem;margin-bottom:0;"><span>可用</span> <span id="mem-avail">--</span></div>
			<div class="info-row" style="margin-bottom:0;"><span>缓存</span> <span id="mem-cached">--</span></div>
		</div>

		<div class="card">
			<div class="card-title">交换内存</div>
			<div class="card-value"><span id="swap-usage">0</span><span class="card-unit">%</span></div>
			<p id="swap-summary" class="card-subtitle">0 / 0 GB</p>
			<div class="progress-container">
				<div id="swap-bar" class="progress-bar"></div>
			</div>
		</div>

		<div class="card">
			<div class="card-title">实时网络传输</div>
			<div class="net-row">
				<div class="net-item">
					<span class="net-label">下载</span>
					<span class="net-value" id="net-down">0.0</span><span class="net-unit">KB/s</span>
				</div>
				<div class="net-item">
					<span class="net-label">上传</span>
					<span class="net-value" id="net-up">0.0</span><span class="net-unit">KB/s</span>
				</div>
			</div>
			<div class="info-row" style="margin-top:0.8rem;margin-bottom:0;"><span>TCP 连接:</span> <span id="net-conns">--</span></div>
		</div>

		<div class="card">
			<div class="card-title">磁盘使用</div>
			<div class="card-value"><span id="disk-usage">0</span><span class="card-unit">%</span></div>
			<p id="disk-summary" class="card-subtitle">0 / 0 GB</p>
			<div class="progress-container">
				<div id="disk-bar" class="progress-bar"></div>
			</div>
			<div class="net-row" style="margin-top:0.8rem;">
				<div class="net-item">
					<span class="net-label">读取</span>
					<span class="net-value" id="disk-read">0.0</span><span class="net-unit">KB/s</span>
				</div>
				<div class="net-item">
					<span class="net-label">写入</span>
					<span class="net-value" id="disk-write">0.0</span><span class="net-unit">KB/s</span>
				</div>
			</div>
		</div>
	</div>

	<div class="status-footer">
		<span class="status-dot"></span> 数据每秒实时更新
	</div>

	<script src="static/js/app.js?v=7"></script>
</body>

</html>
